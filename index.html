<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typo — Minimal Text Editor</title>
  <meta name="description" content="Typo is a simple, minimalist web-based text editor in a single HTML file." />

  <style>
    :root {
      --bg: #f8fbff;
      --fg: #0b2a4a;
      --muted: #6e87a0;
      --primary: #2563eb;
      --ring: rgba(37, 99, 235, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e6eef7;
      background: white;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: white;
      border: 2px solid var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-weight: bold;
      font-size: 20px;
      color: var(--primary);
    }

    .brand {
      font-size: 20px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-left: 8px;
    }

    main {
      flex: 1;
      display: flex;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      outline: none;
      font-size: 16px;
      line-height: 1.6;
      font-family: "SF Mono", Monaco, Consolas, monospace;
      background: transparent;
      color: var(--fg);
    }

    footer {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid #e6eef7;
      background: white;
      display: flex;
      justify-content: space-between;
    }

    button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">T</div>
    <div class="brand">Typo</div>
    <div class="subtitle">Minimal Text Editor</div>
  </header>

  <main>
    <textarea id="editor" placeholder="Start writing..."></textarea>
  </main>

  <footer>
    <div id="status">Saved locally</div>
    <button onclick="clearText()">Clear</button>
  </footer>

  <script>
    const editor = document.getElementById("editor");
    const status = document.getElementById("status");

    const STORAGE_KEY = "typo-content";

    // Load saved content
    editor.value = localStorage.getItem(STORAGE_KEY) || "";

    // Auto-save
    editor.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, editor.value);
      status.textContent = "Saved locally";
    });

    function clearText() {
      if (confirm("Clear all text in Typo?")) {
        editor.value = "";
        localStorage.removeItem(STORAGE_KEY);
        status.textContent = "Cleared";
      }
    }
  </script>
</body>
</html>
