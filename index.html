<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Typo</title>
  <meta name="description" content="Typo — a minimalist text editor in a single HTML file." />

  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f9ff;
      --panel:#ffffff;
      --fg:#0b2a4a;
      --muted:#6e87a0;
      --primary:#2563eb;
      --border:rgba(11,42,74,.12);
      --border2:rgba(11,42,74,.08);
      --ring:rgba(37,99,235,.18);
      --radius:14px;
      --radius-sm:10px;
      --font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--fg);
      background:linear-gradient(180deg, var(--bg), #fff);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 16px 22px;
      height:100%;
      display:flex;
    }

    .app{
      width:100%;
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 28px rgba(11,42,74,.06);
      min-height:calc(100vh - 40px);
    }

    /* toolbar: try keep everything on one row when possible */
    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border-bottom:1px solid var(--border2);
      /* prefer single row; allow horizontal scroll if needed on small widths */
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
    }

    /* Visual spacing when scrolled */
    .toolbar::-webkit-scrollbar{height:8px}
    .toolbar::-webkit-scrollbar-thumb{background:rgba(11,42,74,.06);border-radius:8px}

    .tile{
      width:36px;
      height:36px;
      border-radius:8px; /* square with soft corners */
      background:#fff;
      border:1px solid rgba(37,99,235,.20);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
    }
    .tile span{
      font-weight:800;
      font-size:18px;
      color:var(--primary);
      line-height:1;
    }

    /* filename behaves like a compact control */
    .filename{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid var(--border2);
      border-radius:10px;
      background:#fff;
      font:600 13px/1 var(--font);
      flex:0 0 auto;
    }
    .filename label{
      font-size:12px;
      color:var(--muted);
      user-select:none;
      margin-right:4px;
    }
    .filename input{
      width:140px;
      border:0;
      outline:0;
      background:transparent;
      font:600 13px/1 var(--font);
      color:var(--fg);
      min-width:64px;
    }
    .filename .ext{font-size:12px; color:var(--muted)}

    /* buttons: smaller, rounded rectangle (not pill) */
    .btn{
      appearance:none;
      border:1px solid var(--border2);
      background:#fff;
      color:var(--fg);
      padding:6px 10px;
      border-radius:10px;         /* rounded rectangle */
      font:600 13px/1 var(--font);
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:transform .06s ease, border-color .12s ease, background-color .12s ease, color .12s ease;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .btn:hover{border-color:rgba(37,99,235,.30)}
    .btn:active{transform:translateY(1px)}

    .btn.danger{border-color:rgba(220,38,38,.20)}
    .btn.danger:hover{border-color:rgba(220,38,38,.45)}

    /* Export: remove blue fill; blue border & blue text */
    .btn.export{
      border-color:rgba(37,99,235,.45);
      color:var(--primary);
      background:linear-gradient(180deg, rgba(37,99,235,0.03), rgba(37,99,235,0.01));
    }
    .btn.export:hover{
      background:rgba(37,99,235,0.06);
    }

    .kbd{
      font:600 11px/1 var(--font);
      color:var(--muted);
      border:1px solid rgba(11,42,74,.10);
      background:rgba(246,249,255,.9);
      padding:3px 6px;
      border-radius:8px;
      display:inline-block;
      line-height:1;
    }

    .wc{
      display:none;
      color:var(--muted);
      font-size:12px;
      padding:6px 9px;
      border:1px solid var(--border2);
      border-radius:10px;
      background:#fff;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .wc.show{display:inline-flex}

    .editorWrap{
      flex:1;
      padding:12px;
      display:flex;
    }

    textarea{
      width:100%;
      flex:1;
      resize:none;
      border:1px solid var(--border2);
      border-radius:12px;
      outline:0;
      padding:14px;
      font:400 15px/1.6 var(--font);
      color:var(--fg);
      background:#fff;
      min-height:280px;
    }
    textarea:focus{
      border-color:rgba(37,99,235,.45);
      box-shadow:0 0 0 6px var(--ring);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(11,42,74,.92);
      color:#fff;
      padding:10px 12px;
      border-radius:999px;
      font:600 13px/1 var(--font);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }
    .toast.show{opacity:1; transform:translateX(-50%) translateY(-2px)}

    /* If there's plenty of width, keep everything centered and on one row */
    @media (min-width: 880px){
      .toolbar{justify-content:flex-start}
    }

    /* On very small screens allow items to wrap to multiple rows (accessibility) */
    @media (max-width:420px){
      .toolbar{flex-wrap:wrap; padding:10px; gap:8px}
      .filename input{width:110px}
      .btn{padding:6px 8px; font-size:13px}
      .kbd{display:none}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="app" role="application" aria-label="Typo text editor">
      <div class="toolbar" role="toolbar" aria-label="Editor controls">
        <div class="tile" aria-hidden="true"><span>T</span></div>

        <div class="filename" role="group" aria-label="Filename">
          <label for="filename">Filename</label>
          <input id="filename" type="text" value="Typo" autocomplete="off" spellcheck="false" />
          <span class="ext">.txt</span>
        </div>

        <button class="btn" id="openBtn" title="Open a .txt file (Ctrl/Cmd+O)">
          Open <span class="kbd" aria-hidden="true">Ctrl/⌘ O</span>
        </button>

        <button class="btn" id="saveBtn" title="Save (Ctrl/Cmd+S)">
          Save <span class="kbd" aria-hidden="true">Ctrl/⌘ S</span>
        </button>

        <button class="btn danger" id="clearBtn" title="Clear editor (Ctrl/Cmd+K)">
          Clear <span class="kbd" aria-hidden="true">Ctrl/⌘ K</span>
        </button>

        <button class="btn export" id="exportBtn" title="Export as .txt (Ctrl/Cmd+E)">
          Export <span class="kbd" aria-hidden="true">Ctrl/⌘ E</span>
        </button>

        <button class="btn" id="wcToggle" title="Toggle word count (Ctrl/Cmd+W)">
          Word count <span class="kbd" aria-hidden="true">Ctrl/⌘ W</span>
        </button>

        <div class="wc" id="wcPill" aria-live="polite">0 words • 0 chars</div>

        <input class="sr-only" id="fileInput" type="file" accept=".txt,text/plain" />
      </div>

      <div class="editorWrap">
        <textarea id="editor" spellcheck="false" aria-label="Text editor"></textarea>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      const editor = document.getElementById('editor');
      const fileInput = document.getElementById('fileInput');
      const openBtn = document.getElementById('openBtn');
      const saveBtn = document.getElementById('saveBtn');
      const clearBtn = document.getElementById('clearBtn');
      const exportBtn = document.getElementById('exportBtn');
      const wcToggle = document.getElementById('wcToggle');
      const wcPill = document.getElementById('wcPill');
      const filenameInput = document.getElementById('filename');
      const toastEl = document.getElementById('toast');

      const LS_KEY_TEXT = 'typo:text:v5';
      const LS_KEY_WC = 'typo:wordcount:show:v5';
      const LS_KEY_FILENAME = 'typo:filename:v5';

      let toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1200);
      }

      function safeBaseName(name) {
        const raw = (name || '').trim() || 'Typo';
        const cleaned = raw.replace(/[<>:"/\\|?*\u0000-\u001F]/g, '-').replace(/\s+/g, ' ').trim();
        if (cleaned === '.' || cleaned === '..') return 'Typo';
        return cleaned.slice(0, 120) || 'Typo';
      }

      function getCounts(text) {
        const chars = text.length;
        const words = (text.trim().match(/\S+/g) || []).length;
        return { words, chars };
      }
      function updateCounts() {
        const { words, chars } = getCounts(editor.value);
        wcPill.textContent = `${words} words • ${chars} chars`;
      }

      // Autosave/load
      function loadState() {
        const savedText = localStorage.getItem(LS_KEY_TEXT);
        if (savedText !== null) editor.value = savedText;

        const savedWC = localStorage.getItem(LS_KEY_WC);
        wcPill.classList.toggle('show', savedWC === '1');

        const savedName = localStorage.getItem(LS_KEY_FILENAME);
        if (savedName) filenameInput.value = savedName;

        updateCounts();
      }
      function saveState() {
        localStorage.setItem(LS_KEY_TEXT, editor.value);
        updateCounts();
      }

      editor.addEventListener('input', saveState);
      filenameInput.addEventListener('input', () => localStorage.setItem(LS_KEY_FILENAME, filenameInput.value));

      // Open
      openBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', async () => {
        const file = fileInput.files && fileInput.files[0];
        fileInput.value = '';
        if (!file) return;
        try {
          const text = await file.text();
          editor.value = text;
          saveState();
          const base = (file.name || '').replace(/\.[^/.]+$/, '');
          if (base) {
            filenameInput.value = base;
            localStorage.setItem(LS_KEY_FILENAME, filenameInput.value);
          }
          toast('Opened');
          editor.focus();
        } catch (e) {
          toast('Could not open');
        }
      });

      // Export (download .txt)
      function downloadTxt() {
        const base = safeBaseName(filenameInput.value);
        const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = base + '.txt';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast('Exported');
      }
      exportBtn.addEventListener('click', downloadTxt);

      // Save shortcut uses same exporter (or File System Access API when available)
      let fileHandle = null;
      async function saveViaHandle() {
        if (!('showSaveFilePicker' in window)) return false;
        try {
          if (!fileHandle) {
            const base = safeBaseName(filenameInput.value);
            fileHandle = await window.showSaveFilePicker({
              suggestedName: base + '.txt',
              types: [{ description: 'Text Files', accept: { 'text/plain': ['.txt'] } }]
            });
          }
          const writable = await fileHandle.createWritable();
          await writable.write(new Blob([editor.value], { type: 'text/plain;charset=utf-8' }));
          await writable.close();
          toast('Saved');
          return true;
        } catch (e) {
          return false;
        }
      }

      saveBtn.addEventListener('click', async () => {
        const ok = await saveViaHandle();
        if (!ok) downloadTxt();
      });

      // Clear
      clearBtn.addEventListener('click', () => {
        editor.value = '';
        saveState();
        toast('Cleared');
        editor.focus();
      });

      // Word count toggle
      wcToggle.addEventListener('click', () => {
        const show = !wcPill.classList.contains('show');
        wcPill.classList.toggle('show', show);
        localStorage.setItem(LS_KEY_WC, show ? '1' : '0');
        updateCounts();
      });

      // Hotkeys
      function isMac() { return /Mac|iPhone|iPad|iPod/.test(navigator.platform); }
      window.addEventListener('keydown', async (e) => {
        const mod = isMac() ? e.metaKey : e.ctrlKey;
        if (!mod) return;
        const key = (e.key || '').toLowerCase();
        if (key === 'o') { e.preventDefault(); fileInput.click(); return; }
        if (key === 's') { e.preventDefault(); const ok = await saveViaHandle(); if (!ok) downloadTxt(); return; }
        if (key === 'e') { e.preventDefault(); downloadTxt(); return; }
        if (key === 'k') { e.preventDefault(); editor.value = ''; saveState(); toast('Cleared'); editor.focus(); return; }
        if (key === 'w') { e.preventDefault(); wcToggle.click(); return; }
      });

      // Init
      loadState();
      editor.focus();
      editor.setSelectionRange(editor.value.length, editor.value.length);
    })();
  </script>
</body>
</html>
