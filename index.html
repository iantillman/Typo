<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typo — Minimal Text Editor</title>
  <meta name="description" content="Typo is a simple, minimalist web-based text editor in a single HTML file." />

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f8fbff;
      --fg: #0b2a4a;
      --muted: #6e87a0;
      --primary: #2563eb;
      --ring: rgba(37, 99, 235, 0.25);
      --border: #e6eef7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: white;
    }

    /* Logo uses Inter explicitly */
    .logo {
      width: 40px;
      height: 40px;
      background: white;
      border: 2px solid var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;

      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1;
      color: var(--primary);
      user-select: none;
    }

    .brand {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-left: 8px;
      font-weight: 400;
    }

    main {
      flex: 1;
      display: flex;
      padding: 20px;
    }

    /* Editor uses Inter too */
    textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      outline: none;

      font-size: 16px;
      line-height: 1.65;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      background: transparent;
      color: var(--fg);
    }

    textarea::placeholder {
      color: var(--muted);
      opacity: 0.9;
    }

    footer {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-weight: 600;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: translateY(0.5px); }

    /* Small “nice” improvement: focus ring when you click into the editor */
    .editorWrap {
      flex: 1;
      border-radius: 12px;
      padding: 14px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(11, 42, 74, 0.04);
      display: flex;
    }

    .editorWrap:focus-within {
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 0 0 4px var(--ring);
      background: white;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">T</div>
    <div class="brand">Typo</div>
    <div class="subtitle">Minimal Text Editor</div>
  </header>

  <main>
    <div class="editorWrap">
      <textarea id="editor" placeholder="Start writing..."></textarea>
    </div>
  </main>

  <footer>
    <div id="status">Saved locally</div>
    <button type="button" onclick="clearText()">Clear</button>
  </footer>

  <script>
    const editor = document.getElementById("editor");
    const status = document.getElementById("status");
    const STORAGE_KEY = "typo-content";

    // Load saved content
    editor.value = localStorage.getItem(STORAGE_KEY) || "";

    // Auto-save
    editor.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, editor.value);
      status.textContent = "Saved locally";
    });

    function clearText() {
      if (confirm("Clear all text in Typo?")) {
        editor.value = "";
        localStorage.removeItem(STORAGE_KEY);
        status.textContent = "Cleared";
      }
    }
  </script>
</body>
</html>
