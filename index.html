<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Typo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f9ff;
      --panel:#ffffff;
      --fg:#0b2a4a;
      --muted:#6e87a0;
      --primary:#2563eb;
      --border:rgba(11,42,74,.12);
      --border2:rgba(11,42,74,.08);
      --ring:rgba(37,99,235,.18);
      --font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--fg);
      background:linear-gradient(180deg, var(--bg), #fff);
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 16px 22px;
      height:100%;
      display:flex;
    }

    .app{
      width:100%;
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 28px rgba(11,42,74,.06);
      min-height:calc(100vh - 40px);
    }

    /* Toolbar */
    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border-bottom:1px solid var(--border2);
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
    }
    .toolbar::-webkit-scrollbar{height:8px}
    .toolbar::-webkit-scrollbar-thumb{background:rgba(11,42,74,.06);border-radius:8px}

    .tile{
      width:36px;
      height:36px;
      border-radius:8px;
      background:#fff;
      border:1px solid rgba(37,99,235,.20);
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }
    .tile span{
      font-weight:800;
      font-size:18px;
      color:var(--primary);
      line-height:1;
    }

    .filename{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid var(--border2);
      border-radius:10px;
      background:#fff;
      font:600 13px/1 var(--font);
      flex:0 0 auto;
    }
    .filename label{
      font-size:12px;
      color:var(--muted);
      user-select:none;
      margin-right:4px;
    }
    .filename input{
      width:140px;
      border:0;
      outline:0;
      background:transparent;
      font:600 13px/1 var(--font);
      color:var(--fg);
      min-width:64px;
    }
    .filename .ext{font-size:12px;color:var(--muted);user-select:none}

    /* Button: smaller rounded rectangle */
    .btn{
      appearance:none;
      border:1px solid var(--border2);
      background:#fff;
      color:var(--fg);
      padding:6px 10px;
      border-radius:10px;
      font:600 13px/1 var(--font);
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:transform .06s ease, border-color .12s ease, background-color .12s ease, color .12s ease;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .btn:hover{border-color:rgba(37,99,235,.30)}
    .btn:active{transform:translateY(1px)}

    /* Export: no fill, blue border */
    .btn.export{
      border-color:rgba(37,99,235,.45);
      color:var(--primary);
      background:linear-gradient(180deg, rgba(37,99,235,0.03), rgba(37,99,235,0.01));
    }
    .btn.export:hover{background:rgba(37,99,235,.06);border-color:var(--primary)}

    .editorWrap{
      flex:1;
      padding:12px;
      display:flex;
    }

    textarea{
      width:100%;
      flex:1;
      resize:none;
      border:1px solid var(--border2);
      border-radius:12px;
      outline:0;
      padding:14px;
      font:400 15px/1.6 var(--font);
      color:var(--fg);
      background:#fff;
      min-height:280px;
    }
    textarea:focus{
      border-color:rgba(37,99,235,.45);
      box-shadow:0 0 0 6px var(--ring);
    }

    /* Subtle bottom word count */
    .footer{
      display:flex;
      justify-content:flex-end;
      padding:8px 12px 12px;
      color:var(--muted);
      font-size:12px;
      border-top:1px solid transparent; /* keeps spacing consistent without looking like a bar */
      user-select:none;
      font-variant-numeric:tabular-nums;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(11,42,74,.92);
      color:#fff;
      padding:10px 12px;
      border-radius:999px;
      font:600 13px/1 var(--font);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }
    .toast.show{opacity:1; transform:translateX(-50%) translateY(-2px)}

    @media (max-width:420px){
      .toolbar{flex-wrap:wrap}
      .filename input{width:110px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="app" role="application" aria-label="Typo text editor">
      <div class="toolbar" role="toolbar" aria-label="Editor controls">
        <div class="tile" aria-hidden="true"><span>T</span></div>

        <div class="filename" role="group" aria-label="Filename">
          <label for="filename">Filename</label>
          <input id="filename" type="text" value="Typo" autocomplete="off" spellcheck="false" />
          <span class="ext">.txt</span>
        </div>

        <button class="btn export" id="exportBtn" title="Export as .txt (Ctrl/Cmd+E)">
          Export
        </button>
      </div>

      <div class="editorWrap">
        <textarea id="editor" spellcheck="false" aria-label="Text editor"></textarea>
      </div>

      <div class="footer" id="counts">0 words • 0 chars</div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      const editor = document.getElementById('editor');
      const exportBtn = document.getElementById('exportBtn');
      const filenameInput = document.getElementById('filename');
      const toastEl = document.getElementById('toast');
      const countsEl = document.getElementById('counts');

      const LS_KEY_TEXT = 'typo:text:v7';
      const LS_KEY_FILENAME = 'typo:filename:v7';

      let toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1200);
      }

      function safeBaseName(name) {
        const raw = (name || '').trim() || 'Typo';
        const cleaned = raw.replace(/[<>:"/\\|?*\u0000-\u001F]/g, '-').replace(/\s+/g, ' ').trim();
        if (cleaned === '.' || cleaned === '..') return 'Typo';
        return cleaned.slice(0, 120) || 'Typo';
      }

      function getCounts(text) {
        const chars = text.length;
        const words = (text.trim().match(/\S+/g) || []).length;
        return { words, chars };
      }

      function updateCounts() {
        const { words, chars } = getCounts(editor.value);
        countsEl.textContent = `${words} words • ${chars} chars`;
      }

      function loadState() {
        const savedText = localStorage.getItem(LS_KEY_TEXT);
        if (savedText !== null) editor.value = savedText;

        const savedName = localStorage.getItem(LS_KEY_FILENAME);
        if (savedName) filenameInput.value = savedName;

        updateCounts();
      }

      function saveState() {
        localStorage.setItem(LS_KEY_TEXT, editor.value);
        updateCounts();
      }

      editor.addEventListener('input', saveState);
      filenameInput.addEventListener('input', () => localStorage.setItem(LS_KEY_FILENAME, filenameInput.value));

      function downloadTxt() {
        const base = safeBaseName(filenameInput.value);
        const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = base + '.txt';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast('Exported');
      }

      exportBtn.addEventListener('click', downloadTxt);

      // Hotkeys: Ctrl/Cmd+E export. Ctrl/Cmd+S also exports (muscle memory).
      function isMac() { return /Mac|iPhone|iPad|iPod/.test(navigator.platform); }
      window.addEventListener('keydown', (e) => {
        const mod = isMac() ? e.metaKey : e.ctrlKey;
        if (!mod) return;
        const key = (e.key || '').toLowerCase();
        if (key === 'e' || key === 's') {
          e.preventDefault();
          downloadTxt();
        }
      });

      loadState();
      editor.focus();
      editor.setSelectionRange(editor.value.length, editor.value.length);
    })();
  </script>
</body>
</html>
