<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Typo</title>
  <meta name="description" content="Typo — a minimalist text editor in a single HTML file." />

  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8fbff;
      --panel:#ffffff;
      --fg:#0b2a4a;
      --muted:#6e87a0;
      --primary:#2563eb;
      --primary-500:#3b82f6;
      --border:rgba(11,42,74,.12);
      --shadow:0 10px 30px rgba(11,42,74,.08);
      --ring:rgba(37,99,235,.22);
      --radius:18px;
      --radius-sm:12px;
      --font: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      background:linear-gradient(180deg, var(--bg), #ffffff);
      color:var(--fg);
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 16px 26px;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:100%;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 14px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:280px;
    }

    .tile{
      width:42px;
      height:42px;
      border-radius:12px;
      background:#fff;
      border:1px solid rgba(37,99,235,.25);
      box-shadow:0 8px 18px rgba(37,99,235,.12);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
    }
    .tile:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(circle at 8px 8px, rgba(37,99,235,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 22px 22px, rgba(37,99,235,.12) 0 2px, transparent 3px);
      pointer-events:none;
    }
    .tile span{
      position:relative;
      font-weight:800;
      font-size:22px;
      letter-spacing:-0.02em;
      color:var(--primary);
      line-height:1;
      font-family:var(--font);
    }

    /* Filename (replaces "Typo" label) */
    .filename{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(248,251,255,.6);
    }
    .filename label{
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }
    .filename input{
      width:170px;
      border:0;
      outline:0;
      background:transparent;
      font:600 14px/1.2 var(--font);
      color:var(--fg);
    }
    .filename .ext{
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color:var(--fg);
      padding:10px 12px;
      border-radius:999px;
      font:600 13px/1 var(--font);
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:transform .05s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow:0 6px 14px rgba(11,42,74,.06);
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px)}
    .btn:hover{border-color:rgba(37,99,235,.35)}
    .btn.primary{
      background:linear-gradient(180deg, var(--primary-500), var(--primary));
      color:#fff;
      border-color:rgba(37,99,235,.45);
      box-shadow:0 10px 22px rgba(37,99,235,.22);
    }
    .btn.danger{
      border-color:rgba(220,38,38,.25);
    }
    .btn.danger:hover{border-color:rgba(220,38,38,.45)}
    .kbd{
      font:600 11px/1 var(--font);
      color:var(--muted);
      border:1px solid rgba(11,42,74,.12);
      border-bottom-color:rgba(11,42,74,.18);
      background:rgba(248,251,255,.9);
      padding:3px 7px;
      border-radius:8px;
    }
    .btn.primary .kbd{
      color:rgba(255,255,255,.9);
      border-color:rgba(255,255,255,.25);
      background:rgba(255,255,255,.15);
    }

    .editorShell{
      flex:1;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:60vh;
    }

    .metaRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:2px 2px 0;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
    }

    .wc{
      display:none;
      color:var(--muted);
      font-size:12px;
      font-variant-numeric:tabular-nums;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(248,251,255,.6);
    }
    .wc.show{display:inline-flex}

    textarea{
      width:100%;
      flex:1;
      resize:none;
      border:1px solid rgba(11,42,74,.10);
      border-radius:var(--radius-sm);
      outline:0;
      padding:14px 14px;
      font:400 15px/1.5 var(--font);
      color:var(--fg);
      background:linear-gradient(180deg, #fff, rgba(248,251,255,.35));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
    }
    textarea:focus{
      border-color:rgba(37,99,235,.45);
      box-shadow:0 0 0 4px var(--ring), inset 0 1px 0 rgba(255,255,255,.7);
      background:#fff;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(11,42,74,.92);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      padding:10px 12px;
      border-radius:999px;
      font:600 13px/1 var(--font);
      box-shadow:0 16px 40px rgba(11,42,74,.22);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      max-width:min(680px, calc(100vw - 28px));
      text-align:center;
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-2px);
    }

    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      border:0;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="tile" aria-hidden="true"><span>T</span></div>

        <!-- Replaces the "Typo" section with a filename box (text input). Default: "Typo". -->
        <div class="filename" title="Filename used for exported .txt files">
          <label for="filename">File</label>
          <input id="filename" type="text" value="Typo" autocomplete="off" spellcheck="false" />
          <span class="ext">.txt</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="openBtn" type="button" title="Open a .txt file (Ctrl/Cmd+O)">
          Open <span class="kbd">Ctrl/⌘ O</span>
        </button>

        <button class="btn" id="saveBtn" type="button" title="Save (Ctrl/Cmd+S)">
          Save <span class="kbd">Ctrl/⌘ S</span>
        </button>

        <button class="btn danger" id="clearBtn" type="button" title="Clear editor (Ctrl/Cmd+K)">
          Clear <span class="kbd">Ctrl/⌘ K</span>
        </button>

        <button class="btn primary" id="exportBtn" type="button" title="Export as .txt (Ctrl/Cmd+E)">
          Export <span class="kbd">Ctrl/⌘ E</span>
        </button>

        <button class="btn" id="wcToggle" type="button" title="Toggle word count (Ctrl/Cmd+W)">
          Word count <span class="kbd">Ctrl/⌘ W</span>
        </button>

        <input class="sr-only" id="fileInput" type="file" accept=".txt,text/plain" />
      </div>
    </div>

    <div class="editorShell">
      <div class="metaRow">
        <div class="hint">Tip: your text autosaves locally in this browser.</div>
        <div class="wc" id="wcPill">0 words • 0 chars</div>
      </div>

      <textarea id="editor" spellcheck="false" placeholder="Start typing…"></textarea>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      const editor = document.getElementById('editor');
      const fileInput = document.getElementById('fileInput');
      const openBtn = document.getElementById('openBtn');
      const saveBtn = document.getElementById('saveBtn');
      const clearBtn = document.getElementById('clearBtn');
      const exportBtn = document.getElementById('exportBtn');
      const wcToggle = document.getElementById('wcToggle');
      const wcPill = document.getElementById('wcPill');
      const filenameInput = document.getElementById('filename');
      const toastEl = document.getElementById('toast');

      const LS_KEY_TEXT = 'typo:text:v1';
      const LS_KEY_WC = 'typo:wordcount:show:v1';
      const LS_KEY_FILENAME = 'typo:filename:v1';

      // ---- Toast
      let toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
      }

      // ---- Filename sanitize
      function safeBaseName(name) {
        const raw = (name || '').trim() || 'Typo';
        // Replace forbidden filename characters across common OSes.
        const cleaned = raw.replace(/[<>:"/\\|?*\u0000-\u001F]/g, '-').replace(/\s+/g, ' ').trim();
        // Avoid "." or ".."
        if (cleaned === '.' || cleaned === '..') return 'Typo';
        return cleaned.slice(0, 120) || 'Typo';
      }

      // ---- Word count
      function getCounts(text) {
        const chars = text.length;
        const words = (text.trim().match(/\S+/g) || []).length;
        return { words, chars };
      }
      function updateCounts() {
        const { words, chars } = getCounts(editor.value);
        wcPill.textContent = `${words} words • ${chars} chars`;
      }

      // ---- Local autosave
      function loadState() {
        const savedText = localStorage.getItem(LS_KEY_TEXT);
        if (savedText !== null) editor.value = savedText;

        const savedWC = localStorage.getItem(LS_KEY_WC);
        const showWC = savedWC === '1';
        wcPill.classList.toggle('show', showWC);

        const savedName = localStorage.getItem(LS_KEY_FILENAME);
        if (savedName) filenameInput.value = savedName;

        updateCounts();
      }
      function saveState() {
        localStorage.setItem(LS_KEY_TEXT, editor.value);
        updateCounts();
      }

      editor.addEventListener('input', saveState);

      filenameInput.addEventListener('input', () => {
        localStorage.setItem(LS_KEY_FILENAME, filenameInput.value);
      });

      // ---- Open
      openBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', async () => {
        const file = fileInput.files && fileInput.files[0];
        fileInput.value = '';
        if (!file) return;

        try {
          const text = await file.text();
          editor.value = text;
          saveState();

          // Set filename from opened file (without extension) if available
          const base = (file.name || '').replace(/\.[^/.]+$/, '');
          if (base) {
            filenameInput.value = base;
            localStorage.setItem(LS_KEY_FILENAME, filenameInput.value);
          }

          toast('Opened.');
        } catch (e) {
          toast('Could not open file.');
        }
      });

      // ---- Export (download .txt)
      function downloadTxt() {
        const base = safeBaseName(filenameInput.value);
        const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = base + '.txt';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast('Exported .txt');
      }

      exportBtn.addEventListener('click', downloadTxt);

      // ---- Save (File System Access API if available; fallback to export)
      let fileHandle = null;

      async function saveViaHandle() {
        if (!('showSaveFilePicker' in window)) return false;

        try {
          if (!fileHandle) {
            const base = safeBaseName(filenameInput.value);
            fileHandle = await window.showSaveFilePicker({
              suggestedName: base + '.txt',
              types: [{ description: 'Text Files', accept: { 'text/plain': ['.txt'] } }]
            });
          }
          const writable = await fileHandle.createWritable();
          await writable.write(new Blob([editor.value], { type: 'text/plain;charset=utf-8' }));
          await writable.close();
          toast('Saved.');
          return true;
        } catch (e) {
          // User likely cancelled; do nothing noisy.
          return false;
        }
      }

      saveBtn.addEventListener('click', async () => {
        const ok = await saveViaHandle();
        if (!ok) downloadTxt();
      });

      // ---- Clear
      clearBtn.addEventListener('click', () => {
        editor.value = '';
        saveState();
        toast('Cleared.');
      });

      // ---- Word count toggle
      wcToggle.addEventListener('click', () => {
        const show = !wcPill.classList.contains('show');
        wcPill.classList.toggle('show', show);
        localStorage.setItem(LS_KEY_WC, show ? '1' : '0');
        updateCounts();
        toast(show ? 'Word count on.' : 'Word count off.');
      });

      // ---- Hotkeys
      function isMac() {
        return /Mac|iPhone|iPad|iPod/.test(navigator.platform);
      }

      window.addEventListener('keydown', async (e) => {
        const mod = isMac() ? e.metaKey : e.ctrlKey;
        if (!mod) return;

        const key = (e.key || '').toLowerCase();

        // Ctrl/Cmd+O
        if (key === 'o') {
          e.preventDefault();
          fileInput.click();
          return;
        }

        // Ctrl/Cmd+S
        if (key === 's') {
          e.preventDefault();
          const ok = await saveViaHandle();
          if (!ok) downloadTxt();
          return;
        }

        // Ctrl/Cmd+E
        if (key === 'e') {
          e.preventDefault();
          downloadTxt();
          return;
        }

        // Ctrl/Cmd+K (clear)
        if (key === 'k') {
          e.preventDefault();
          editor.value = '';
          saveState();
          toast('Cleared.');
          return;
        }

        // Ctrl/Cmd+W (toggle word count) — prevent browser tab close
        if (key === 'w') {
          e.preventDefault();
          wcToggle.click();
          return;
        }
      });

      // Init
      loadState();
      editor.focus();
    })();
  </script>
</body>
</html>
