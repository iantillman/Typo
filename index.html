<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Typo</title>
  <meta name="description" content="Typo — a minimalist text editor in a single HTML file." />

  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f9ff;
      --panel:#ffffff;
      --fg:#0b2a4a;
      --muted:#6e87a0;
      --primary:#2563eb;
      --border:rgba(11,42,74,.12);
      --border2:rgba(11,42,74,.08);
      --ring:rgba(37,99,235,.22);
      --radius:18px;
      --radius-sm:12px;
      --font: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--fg);
      background:linear-gradient(180deg, var(--bg), #fff);
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 16px 22px;
      height:100%;
      display:flex;
    }

    .app{
      width:100%;
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:0 10px 28px rgba(11,42,74,.06);
      min-height:calc(100vh - 40px);
    }

    /* Single clean toolbar row */
    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border-bottom:1px solid var(--border2);
      flex-wrap:wrap; /* wraps nicely on phones */
    }

    .tile{
      width:36px;
      height:36px;
      border-radius:10px;
      background:#fff;
      border:1px solid rgba(37,99,235,.25);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
    }
    .tile:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(circle at 7px 7px, rgba(37,99,235,.16) 0 2px, transparent 3px),
        radial-gradient(circle at 20px 20px, rgba(37,99,235,.10) 0 2px, transparent 3px);
      pointer-events:none;
    }
    .tile span{
      position:relative;
      font-weight:800;
      font-size:20px;
      letter-spacing:-0.02em;
      color:var(--primary);
      line-height:1;
    }

    /* Filename now behaves like another menu item */
    .filename{
      display:flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border:1px solid var(--border2);
      border-radius:999px;
      background:#fff;
      font:600 13px/1 var(--font);
    }
    .filename label{
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }
    .filename input{
      width:140px;
      border:0;
      outline:0;
      background:transparent;
      font:600 13px/1 var(--font);
      color:var(--fg);
      min-width:60px;
    }
    .filename .ext{
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border2);
      background:#fff;
      color:var(--fg);
      padding:9px 12px;
      border-radius:999px;
      font:600 13px/1 var(--font);
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:border-color .15s ease, transform .05s ease, color .15s ease;
      white-space:nowrap;
    }
    .btn:hover{border-color:rgba(37,99,235,.35)}
    .btn:active{transform:translateY(1px)}

    .btn.danger{
      border-color:rgba(220,38,38,.25);
    }
    .btn.danger:hover{
      border-color:rgba(220,38,38,.45);
    }

    /* Export: no fill, subtle blue border */
    .btn.export{
      border-color:rgba(37,99,235,.45);
      color:var(--primary);
    }
    .btn.export:hover{
      border-color:var(--primary);
      background:rgba(37,99,235,.05);
    }

    .kbd{
      font:600 11px/1 var(--font);
      color:var(--muted);
      border:1px solid rgba(11,42,74,.12);
      background:rgba(246,249,255,.8);
      padding:3px 7px;
      border-radius:8px;
    }

    .wc{
      display:none;
      color:var(--muted);
      font-size:12px;
      font-variant-numeric:tabular-nums;
      padding:7px 10px;
      border:1px solid var(--border2);
      border-radius:999px;
      background:#fff;
      white-space:nowrap;
    }
    .wc.show{display:inline-flex}

    .editorWrap{
      flex:1;
      padding:10px 12px 12px;
      display:flex;
    }

    textarea{
      width:100%;
      flex:1;
      resize:none;
      border:1px solid var(--border2);
      border-radius:var(--radius-sm);
      outline:0;
      padding:14px;
      font:400 15px/1.55 var(--font);
      color:var(--fg);
      background:#fff;
    }
    textarea:focus{
      border-color:rgba(37,99,235,.45);
      box-shadow:0 0 0 4px var(--ring);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(11,42,74,.92);
      color:#fff;
      padding:10px 12px;
      border-radius:999px;
      font:600 13px/1 var(--font);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-2px);
    }

    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      border:0;
    }

    /* Mobile behavior */
    @media (max-width:600px){
      .kbd{display:none}
      .filename input{width:110px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="app">
      <div class="toolbar">

        <div class="tile"><span>T</span></div>

        <div class="filename">
          <label for="filename">Filename</label>
          <input id="filename" type="text" value="Typo" autocomplete="off" spellcheck="false" />
          <span class="ext">.txt</span>
        </div>

        <button class="btn" id="openBtn">
          Open <span class="kbd">Ctrl/⌘ O</span>
        </button>

        <button class="btn" id="saveBtn">
          Save <span class="kbd">Ctrl/⌘ S</span>
        </button>

        <button class="btn danger" id="clearBtn">
          Clear <span class="kbd">Ctrl/⌘ K</span>
        </button>

        <button class="btn export" id="exportBtn">
          Export <span class="kbd">Ctrl/⌘ E</span>
        </button>

        <button class="btn" id="wcToggle">
          Word count <span class="kbd">Ctrl/⌘ W</span>
        </button>

        <div class="wc" id="wcPill">0 words • 0 chars</div>

        <input class="sr-only" id="fileInput" type="file" accept=".txt,text/plain" />
      </div>

      <div class="editorWrap">
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      const editor = document.getElementById('editor');
      const fileInput = document.getElementById('fileInput');
      const openBtn = document.getElementById('openBtn');
      const saveBtn = document.getElementById('saveBtn');
      const clearBtn = document.getElementById('clearBtn');
      const exportBtn = document.getElementById('exportBtn');
      const wcToggle = document.getElementById('wcToggle');
      const wcPill = document.getElementById('wcPill');
      const filenameInput = document.getElementById('filename');
      const toastEl = document.getElementById('toast');

      const LS_KEY_TEXT = 'typo:text:v4';
      const LS_KEY_WC = 'typo:wordcount:show:v4';
      const LS_KEY_FILENAME = 'typo:filename:v4';

      let toastTimer=null;
      function toast(msg){
        toastEl.textContent=msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1200);
      }

      function safeBaseName(name){
        const raw=(name||'').trim()||'Typo';
        return raw.replace(/[<>:"/\\|?*\u0000-\u001F]/g,'-').trim()||'Typo';
      }

      function getCounts(text){
        const chars=text.length;
        const words=(text.trim().match(/\S+/g)||[]).length;
        return {words,chars};
      }
      function updateCounts(){
        const {words,chars}=getCounts(editor.value);
        wcPill.textContent=`${words} words • ${chars} chars`;
      }

      function loadState(){
        const savedText=localStorage.getItem(LS_KEY_TEXT);
        if(savedText!==null) editor.value=savedText;

        const savedWC=localStorage.getItem(LS_KEY_WC);
        wcPill.classList.toggle('show', savedWC==='1');

        const savedName=localStorage.getItem(LS_KEY_FILENAME);
        if(savedName) filenameInput.value=savedName;

        updateCounts();
      }
      function saveState(){
        localStorage.setItem(LS_KEY_TEXT,editor.value);
        updateCounts();
      }

      editor.addEventListener('input',saveState);
      filenameInput.addEventListener('input',()=>localStorage.setItem(LS_KEY_FILENAME,filenameInput.value));

      openBtn.onclick=()=>fileInput.click();
      fileInput.onchange=async()=>{
        const file=fileInput.files[0];
        fileInput.value='';
        if(!file) return;
        const text=await file.text();
        editor.value=text;
        saveState();
        filenameInput.value=file.name.replace(/\.[^/.]+$/,'');
        toast('Opened');
      };

      function downloadTxt(){
        const base=safeBaseName(filenameInput.value);
        const blob=new Blob([editor.value],{type:'text/plain;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download=base+'.txt';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast('Exported');
      }
      exportBtn.onclick=downloadTxt;

      saveBtn.onclick=downloadTxt;

      clearBtn.onclick=()=>{
        editor.value='';
        saveState();
        toast('Cleared');
      };

      wcToggle.onclick=()=>{
        const show=!wcPill.classList.contains('show');
        wcPill.classList.toggle('show',show);
        localStorage.setItem(LS_KEY_WC,show?'1':'0');
      };

      function isMac(){
        return /Mac|iPhone|iPad|iPod/.test(navigator.platform);
      }

      window.addEventListener('keydown',e=>{
        const mod=isMac()?e.metaKey:e.ctrlKey;
        if(!mod) return;
        const key=e.key.toLowerCase();
        if(key==='o'){e.preventDefault();fileInput.click();}
        if(key==='s'){e.preventDefault();downloadTxt();}
        if(key==='e'){e.preventDefault();downloadTxt();}
        if(key==='k'){e.preventDefault();editor.value='';saveState();toast('Cleared');}
        if(key==='w'){e.preventDefault();wcToggle.click();}
      });

      loadState();
      editor.focus();
    })();
  </script>
</body>
</html>
